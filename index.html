<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <!-- A meta tag abaixo é CRUCIAL para não dar zoom e ter aparência de app nativo -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Para o meu amor ❤️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            /* Impede seleção de texto e highlight azul em botões no mobile */
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #ffe6eb;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; /* Impede scroll */
            touch-action: none; /* Previne qualquer gesto de navegador (pull-to-refresh, swipe back) */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
        }

        #game-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            height: 100%;
            width: 100%;
            padding: 10px 0;
        }

        .header {
            text-align: center;
            color: #d81b60;
            margin-bottom: 5px;

        .header h1 {
            font-size: 22px;
            margin-bottom: 2px;

        .header p {
            font-size: 14px;

            background-color: #fff;

        /* Controles (D-PAD) */
        #controls {

        #btn-up { grid-column: 2; grid-row: 1; }

        #win-screen {

            margin-bottom: 20px;

<body>

    <!-- Tela do Jogo -->
    <div id="game-screen">
        <div class="header">
            <h1>Caminho do Coração</h1>
            <p>Encontre a cartinha amor!</p>
        </div>
        
        <div id="canvas-container">
            <canvas id="mazeCanvas"></canvas>
        </div>

        <div id="controls">
            <div class="btn" id="btn-up">⬆️</div>
            <div class="btn" id="btn-left">⬅️</div>
            <div class="btn" id="btn-right">➡️</div>
            <div class="btn" id="btn-down">⬇️</div>
        </div>
    </div>

    <!-- Tela de Vitória -->
    <div id="win-screen">
        <div class="heart-icon" id="win-heart">❤️</div>
        <h1 id="win-title">EU TE AMO!</h1>
        <p id="win-text1">Você encontrou o caminho, mas a verdade é que você já é a dona do meu coração há muito tempo.</p>
        <p id="win-text2">Obrigado por ser a melhor namorada do mundo. Cada segundo com você é especial! 🥰</p>
    </div>

    <script>
        // --- Configurações do Jogo ---
        const canvas = document.getElementById('mazeCanvas');
        const ctx = canvas.getContext('2d');
        
        // Tamanho do labirinto (Colunas x Linhas). 15x20 dá um bom trabalho e leva cerca de 1-2 min.
        const cols = 15;
        const rows = 20; 
        
        // Ajuste responsivo
        const screenWidth = window.innerWidth;
        const screenHeight = window.innerHeight;
        
        // O canvas vai ocupar parte da tela, deixando espaço para header e d-pad
        const maxCanvasWidth = screenWidth - 40;
        const cellSize = Math.floor(maxCanvasWidth / cols);
        
        canvas.width = cols * cellSize;
        canvas.height = rows * cellSize;

        // Variaveis de estado
        let grid = [];
        let current;
        let stack = [];
        let player = { x: 0, y: 0 };
        let goal = { x: cols - 1, y: rows - 1 };
        let gameWon = false;

        // --- Geração do Labirinto (Recursive Backtracker) ---
        class Cell {
            constructor(c, r) {
                this.c = c;
                this.r = r;
                this.walls = [true, true, true, true]; // Topo, Direita, Baixo, Esquerda
                this.visited = false;
            }

            draw() {
                const x = this.c * cellSize;
                const y = this.r * cellSize;
                
                ctx.strokeStyle = '#f06292'; // Cor das paredes (Rosa)
                ctx.lineWidth = 2;
                ctx.lineCap = "round";

                ctx.beginPath();
                if (this.walls[0]) { ctx.moveTo(x, y); ctx.lineTo(x + cellSize, y); } // Topo
                if (this.walls[1]) { ctx.moveTo(x + cellSize, y); ctx.lineTo(x + cellSize, y + cellSize); } // Direita
                if (this.walls[2]) { ctx.moveTo(x + cellSize, y + cellSize); ctx.lineTo(x, y + cellSize); } // Baixo
                if (this.walls[3]) { ctx.moveTo(x, y + cellSize); ctx.lineTo(x, y); } // Esquerda
                ctx.stroke();
            }

            checkNeighbors() {
                let neighbors = [];
                const top    = grid[this.c][this.r - 1];
                const right  = grid[this.c + 1] ? grid[this.c + 1][this.r] : undefined;
                const bottom = grid[this.c][this.r + 1];
                const left   = grid[this.c - 1] ? grid[this.c - 1][this.r] : undefined;

                if (top && !top.visited) neighbors.push(top);
                if (right && !right.visited) neighbors.push(right);
                if (bottom && !bottom.visited) neighbors.push(bottom);
                if (left && !left.visited) neighbors.push(left);

                if (neighbors.length > 0) {
                    const r = Math.floor(Math.random() * neighbors.length);
                    return neighbors[r];
                } else {
                    return undefined;
                }
            }
        }

        function removeWalls(a, b) {
            const x = a.c - b.c;
            if (x === 1) {
                a.walls[3] = false;
                b.walls[1] = false;
            } else if (x === -1) {
                a.walls[1] = false;
                b.walls[3] = false;
            }
            const y = a.r - b.r;
            if (y === 1) {
                a.walls[0] = false;
                b.walls[2] = false;
            } else if (y === -1) {
                a.walls[2] = false;
                b.walls[0] = false;
            }
        }

        function generateMaze() {
            for (let c = 0; c < cols; c++) {
                grid[c] = [];
                for (let r = 0; r < rows; r++) {
                    grid[c][r] = new Cell(c, r);
                }
            }

            current = grid[0][0];
            current.visited = true;
            
            // Loop síncrono para gerar instantaneamente
            let generating = true;
            while (generating) {
                let next = current.checkNeighbors();
                if (next) {
                    next.visited = true;
                    stack.push(current);
                    removeWalls(current, next);
                    current = next;
                } else if (stack.length > 0) {
                    current = stack.pop();
                } else {
                    generating = false;
                }
            }
        }

        // --- Renderização ---
        function drawGame() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Desenhar labirinto
            for (let c = 0; c < cols; c++) {
                for (let r = 0; r < rows; r++) {
                    grid[c][r].draw();
                }
            }

            // Desenhar Objetivo (Cartinha)
            ctx.font = `${cellSize * 0.7}px Arial`;
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText("💌", goal.x * cellSize + cellSize/2, goal.y * cellSize + cellSize/2);

            // Desenhar Player (Coração)
            ctx.fillText("💖", player.x * cellSize + cellSize/2, player.y * cellSize + cellSize/2);
        }

        // --- Movimentação ---
        function movePlayer(direction) {
            if(gameWon) return;

            let currentCell = grid[player.x][player.y];
            
            if (direction === 'up' && !currentCell.walls[0]) player.y--;
            else if (direction === 'right' && !currentCell.walls[1]) player.x++;
            else if (direction === 'down' && !currentCell.walls[2]) player.y++;
            else if (direction === 'left' && !currentCell.walls[3]) player.x--;

            drawGame();
            checkWin();
        }

        function checkWin() {
            if (player.x === goal.x && player.y === goal.y) {
                gameWon = true;
                setTimeout(showWinScreen, 300);
            }
        }

        // --- Controles de Toque (Com suporte a pressionar e segurar) ---
        let moveInterval = null;

        function handleTouchStart(btnId, direction) {
            const btn = document.getElementById(btnId);
            btn.addEventListener('touchstart', (e) => {
                e.preventDefault(); // Impede duplo clique e scroll
                btn.classList.add('active');
                movePlayer(direction);
                // Permite segurar o botão para andar contínuo
                moveInterval = setInterval(() => movePlayer(direction), 150); 
            }, {passive: false});

            btn.addEventListener('touchend', (e) => {
                e.preventDefault();
                btn.classList.remove('active');
                clearInterval(moveInterval);
            });
            // Tratamento caso o dedo saia do botão
            btn.addEventListener('touchcancel', (e) => {
                btn.classList.remove('active');
                clearInterval(moveInterval);
            });
        }

        handleTouchStart('btn-up', 'up');
        handleTouchStart('btn-down', 'down');
        handleTouchStart('btn-left', 'left');
        handleTouchStart('btn-right', 'right');

        // Previne scroll acidental tocando fora dos botões
        document.addEventListener('touchmove', function(e) {
            e.preventDefault();
        }, { passive: false });


        // --- Animação de Vitória ---
        function createFloatingHearts() {
            const winScreen = document.getElementById('win-screen');
            for(let i=0; i<20; i++) {
                let heart = document.createElement('div');
                heart.innerHTML = '❤️';
                heart.className = 'floating-heart';
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.animationDuration = (Math.random() * 3 + 2) + 's';
                heart.style.animationDelay = Math.random() * 2 + 's';
                winScreen.appendChild(heart);
            }
        }

        function showWinScreen() {
            document.getElementById('game-screen').style.display = 'none';
            const winScreen = document.getElementById('win-screen');
            winScreen.style.display = 'flex';
            
            // Inicia os corações subindo
            createFloatingHearts();

            // Trigger animations
            setTimeout(() => {
                document.getElementById('win-title').classList.add('show-anim');
            }, 100);
            setTimeout(() => {
                document.getElementById('win-text1').classList.add('show-anim');
            }, 800);
            setTimeout(() => {
                document.getElementById('win-text2').classList.add('show-anim');
            }, 1600);
            setTimeout(() => {
                document.getElementById('win-heart').classList.add('show-anim');
            }, 2400);
        }

        // --- Inicialização ---
        generateMaze();
        drawGame();

    </script>
</body>
</html>
